services:
  postgres:
    image: postgres:16-alpine
    container_name: sorak-postgres
    environment:
      POSTGRES_DB: sorak
      POSTGRES_USER: sorak
      POSTGRES_PASSWORD: sorak
    ports: ['5432:5432']
    volumes:
      - ./.data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sorak -d sorak']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: sorak-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./.data/minio:/data
